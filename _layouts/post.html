---
layout: default
---
<style>
.post-wrap { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem; }
.post-meta { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.post-title { font-family: 'DM Serif Display', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); color: var(--green-dark); margin-bottom: 1.5rem; line-height: 1.3; }
.post-category {
  display: inline-block; font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 999px;
  background: var(--green-pale); color: var(--green-mid);
  margin-bottom: 0.75rem;
}
.post-body { font-size: 0.9rem; color: var(--text-muted); line-height: 1.9; }
.post-body h2 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--green-dark); margin: 1.5rem 0 0.5rem; }
.post-body p { margin-bottom: 1rem; }
.post-body img { width: 100%; border-radius: 10px; margin: 1rem 0; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--green-mid); text-decoration: none; margin-bottom: 2rem; }
.back-link:hover { color: var(--green); }
</style>

<div class="post-wrap">
  <a href="{{ site.baseurl }}/news/" class="back-link">← 소식 목록으로</a>
  <div class="post-category">{{ page.category | default: "공지" }}</div>
  <div class="post-meta">{{ page.date | date: "%Y년 %m월 %d일" }}</div>
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.image %}
  <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%; border-radius:12px; margin-bottom:1.5rem;">
  {% endif %}
  <div class="post-body">{{ content }}</div>
</div>
