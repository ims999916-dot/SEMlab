<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} — SEMLAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #0a3d2e;
  --green-mid: #0f6e56;
  --green: #1d9e75;
  --green-light: #9fe1cb;
  --green-pale: #e1f5ee;
  --cream: #f8f6f0;
  --warm-white: #fdfcfa;
  --text: #1a1a18;
  --text-muted: #7a7a72;
  --border: rgba(0,0,0,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: var(--warm-white);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── NAV ── */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 9999;
  background: #fff;
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}
.nav-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem;
  color: #fff;
  text-decoration: none;
  letter-spacing: 0.05em;
}
.nav-links {
  display: flex;
  gap: 0.25rem;
  list-style: none;
}
.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.nav-links a:hover,
.nav-links a.active {
  color: var(--green-dark);
  background: var(--green-pale);
}
.nav-hamburger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
}
.nav-hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--green-dark);
  margin: 4px 0;
  border-radius: 2px;
  transition: 0.3s;
}
.mobile-menu {
  display: none;
  background: var(--green-dark);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 0.75rem 1.5rem 1rem;
}
.mobile-menu.open { display: block; }
.mobile-menu a {
  display: block;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 0.9rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.mobile-menu a:last-child { border-bottom: none; }

/* ── PAGE HERO ── */
.page-hero {
  background: var(--green-dark);
  padding: 3rem 1.5rem 2.5rem;
  position: relative;
  overflow: hidden;
}
.page-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(29,158,117,0.2) 0%, transparent 60%);
}
.page-hero-inner {
  max-width: 1000px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.page-hero-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green-light);
  margin-bottom: 0.5rem;
}
.page-hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: #fff;
  line-height: 1.2;
}

/* ── MAIN ── */
.main-content {
  max-width: 1000px;
  margin: 0 auto;
  padding: 3rem 1.5rem;
}

/* ── FOOTER ── */
.site-footer {
  background: var(--green-dark);
  padding: 1.5rem;
  text-align: center;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.3);
}

/* ── CARD COMMON ── */
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.card:hover { border-color: var(--green-light); transform: translateY(-2px); }

.s-label-tag {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green-mid);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.s-label-tag::before {
  content: '';
  display: block;
  width: 18px;
  height: 1px;
  background: var(--green-mid);
}
.s-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--green-dark);
  margin-bottom: 2rem;
  line-height: 1.25;
}

@media (max-width: 640px) {
  .site-nav { position: sticky; top: 0; z-index: 9999; background: #fff; }
  .nav-inner { height: 58px; padding: 0 1.1rem; }
  .nav-logo img { height: 34px !important; }
  .nav-links { display: none; }
  .nav-hamburger { display: block; z-index: 10001; }
  .mobile-menu { position: fixed; top: 58px; left: 0; right: 0; background: #fff; z-index: 10000; border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border); box-shadow: 0 14px 30px rgba(0,0,0,0.08); padding: 0.4rem 1.1rem 0.6rem; }
  .mobile-menu.open { display: block; }
  .mobile-menu a {display: block; color: var(--text); font-size: 0.92rem; font-weight: 500;
    padding: 0.85rem 0.2rem; border-bottom: 1px solid var(--border); text-decoration: none; }
  .mobile-menu a.active { color: var(--green-mid); font-weight: 700; }
  .mobile-menu a:last-child { border-bottom: none; }
}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="{{ site.baseurl }}/" class="nav-logo">
      <img src="{{ site.baseurl }}/assets/images/semlab-logo.png" alt="SEMLAB" style="height:32px; width:auto; display:block;">
    </a>
    <ul class="nav-links">
      <li><a href="{{ site.baseurl }}/" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
      <li><a href="{{ site.baseurl }}/members/" {% if page.url contains 'members' %}class="active"{% endif %}>Members</a></li>
      <li><a href="{{ site.baseurl }}/news/" {% if page.url contains 'news' %}class="active"{% endif %}>News</a></li>
      <li><a href="{{ site.baseurl }}/gallery/" {% if page.url contains 'gallery' %}class="active"{% endif %}>Gallery</a></li>
      <li><a href="mailto:2668602@pcu.ac.kr">Contact</a></li>
    </ul>
    <button class="nav-hamburger" onclick="toggleMenu()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="{{ site.baseurl }}/">Home</a>
    <a href="{{ site.baseurl }}/members/">Members</a>
    <a href="{{ site.baseurl }}/news/">News</a>
    <a href="{{ site.baseurl }}/gallery/">Gallery</a>
    <a href="mailto:2668602@pcu.ac.kr">Contact</a>
  </div>
</nav>

{{ content }}

<footer class="site-footer">
  &copy; 2025 SEMLAB — Smart Energy Mobility Laboratory
</footer>

<script>
function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
  document.querySelectorAll('#mobileMenu a').forEach(function(link) {
    link.addEventListener('click', function() {
      document.getElementById('mobileMenu').classList.remove('open');
    });
  });
}
// 현재 페이지 메뉴 활성화
document.querySelectorAll('.nav-links a, .mobile-menu a').forEach(a => {
  if (a.href === location.href) a.classList.add('active');
});
// 스크롤 애니메이션
const obs = new IntersectionObserver((entries) => {
  entries.forEach((e,i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('visible'), i * 80);
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
</script>
</body>
</html>
